version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Direct deps only — stops one-PR-per-transitive-package noise.
    allow:
      - dependency-type: direct
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        patterns:
          - "*"
      development:
        dependency-type: development
        patterns:
          - "*"
